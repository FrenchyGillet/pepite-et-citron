<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#2c2c2e"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <radialGradient id="lemon" cx="36%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#fffac0"/>
      <stop offset="40%"  stop-color="#ffd60a"/>
      <stop offset="100%" stop-color="#d4a000"/>
    </radialGradient>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Lemon body -->
  <path d="
    M 148 268
    C 136 212  162 150  220 128
    C 258 114  308 120  346 148
    C 384 176  402 218  396 267
    C 390 316  358 364  310 380
    C 268 394  222 388  188 362
    C 148 332  160 324  148 268 Z"
    fill="url(#lemon)"/>

  <!-- Specular highlight -->
  <ellipse cx="228" cy="206" rx="64" ry="38"
           fill="rgba(255,255,255,0.28)"
           transform="rotate(-14 228 206)"/>

  <!-- Subtle shadow at bottom -->
  <path d="
    M 188 362
    C 148 332  160 324  148 268
    C 140 240  150 200  168 170"
    stroke="rgba(0,0,0,0.12)" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Stem -->
  <path d="M 344 140 C 360 118 382 106 396 94"
        stroke="#3d7020" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- Leaf -->
  <path d="M 360 124 C 380 100 412 100 416 120 C 408 140 378 142 360 124 Z"
        fill="#5aaa2a"/>
  <!-- Leaf vein -->
  <path d="M 360 124 C 382 112 410 116 416 120"
        stroke="#3d7020" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
