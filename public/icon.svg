<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Fond : dégradé orange chaud -->
    <radialGradient id="bg" cx="50%" cy="18%" r="84%">
      <stop offset="0%"   stop-color="#FFC820"/>
      <stop offset="52%"  stop-color="#FF8000"/>
      <stop offset="100%" stop-color="#FF3A00"/>
    </radialGradient>

    <!-- Gemme : jaune doré -->
    <linearGradient id="gemBody" x1="18%" y1="5%" x2="82%" y2="95%">
      <stop offset="0%"   stop-color="#FFF4A0"/>
      <stop offset="38%"  stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#B87800"/>
    </linearGradient>
    <linearGradient id="gemTopFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFDE0"/>
      <stop offset="100%" stop-color="#FFEA50"/>
    </linearGradient>

    <!-- Citron -->
    <radialGradient id="lemonBody" cx="38%" cy="30%" r="63%">
      <stop offset="0%"   stop-color="#FEFFC0"/>
      <stop offset="46%"  stop-color="#FFE220"/>
      <stop offset="100%" stop-color="#C09800"/>
    </radialGradient>

    <!-- Feuille -->
    <linearGradient id="leafA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#74CE44"/>
      <stop offset="100%" stop-color="#306010"/>
    </linearGradient>
    <linearGradient id="leafB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#60BA30"/>
      <stop offset="100%" stop-color="#255210"/>
    </linearGradient>
  </defs>

  <!-- ── Fond ────────────────────────────────────────────────────── -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Brillance vitrée en haut -->
  <path d="M 112 0 Q 0 0 0 112 L 0 195
           C 95 150 200 124 256 120
           C 312 124 417 150 512 195
           L 512 112 Q 512 0 400 0 Z"
        fill="rgba(255,255,255,0.22)"/>

  <!-- ── GEMME (Pépite) ─────────────────────────────────────────── -->
  <!-- Ombre portée -->
  <path d="M 158 210 L 190 156 L 264 146 L 298 188 L 290 278 L 254 320 L 170 314 L 140 272 Z"
        fill="rgba(0,0,0,0.25)" transform="translate(6,8)"/>

  <!-- Contour épais sombre -->
  <path d="M 156 208 L 188 154 L 262 144 L 296 186 L 288 276 L 252 318 L 168 312 L 138 270 Z"
        fill="#3E2800"/>

  <!-- Corps principal -->
  <path d="M 163 210 L 194 160 L 260 151 L 290 190 L 282 272 L 248 310 L 173 304 L 146 265 Z"
        fill="url(#gemBody)"/>

  <!-- Face supérieure (plus claire) -->
  <path d="M 194 160 L 260 151 L 290 190 L 218 213 L 163 210 Z"
        fill="url(#gemTopFace)" opacity="0.72"/>

  <!-- Arête centrale (entre face haute et face avant) -->
  <line x1="218" y1="213" x2="248" y2="310"
        stroke="rgba(180,120,0,0.30)" stroke-width="2.5"/>

  <!-- Face gauche légèrement plus sombre -->
  <path d="M 146 265 L 163 210 L 218 213 L 173 304 Z"
        fill="rgba(0,0,0,0.10)"/>

  <!-- Face droite légèrement plus sombre -->
  <path d="M 290 190 L 282 272 L 248 310 L 218 213 Z"
        fill="rgba(0,0,0,0.07)"/>

  <!-- ✦ Grande étincelle -->
  <path d="M 186 169 L 190 152 L 194 169 L 211 173 L 194 177 L 190 194 L 186 177 L 169 173 Z"
        fill="white"/>
  <!-- ✦ Étincelle moyenne -->
  <path d="M 231 143 L 234 134 L 237 143 L 246 146 L 237 149 L 234 158 L 231 149 L 222 146 Z"
        fill="white" opacity="0.90"/>
  <!-- • Points lumineux -->
  <circle cx="211" cy="150" r="4.5" fill="white" opacity="0.85"/>
  <circle cx="167" cy="190" r="2.5" fill="white" opacity="0.65"/>
  <circle cx="246" cy="155" r="2"   fill="white" opacity="0.60"/>

  <!-- ── CITRON ──────────────────────────────────────────────────── -->
  <!-- Ombre portée -->
  <ellipse cx="336" cy="296" rx="91" ry="82"
           fill="rgba(0,0,0,0.22)"
           transform="rotate(-8 336 296) translate(5,7)"/>

  <!-- Contour épais sombre -->
  <ellipse cx="332" cy="290" rx="91" ry="82"
           fill="#4E3C00"
           transform="rotate(-8 332 290)"/>

  <!-- Corps du citron -->
  <ellipse cx="332" cy="288" rx="83" ry="74"
           fill="url(#lemonBody)"
           transform="rotate(-8 332 288)"/>

  <!-- Reflet principal -->
  <ellipse cx="302" cy="247" rx="37" ry="25"
           fill="rgba(255,255,255,0.40)"
           transform="rotate(-22 302 247)"/>

  <!-- Goutte d'eau -->
  <ellipse cx="386" cy="296" rx="8" ry="11"
           fill="rgba(255,255,255,0.50)"
           transform="rotate(12 386 296)"/>

  <!-- Tige -->
  <path d="M 358 206 C 364 186 374 170 382 156"
        stroke="#4A2C08" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Feuille arrière (droite) -->
  <path d="M 361 203 C 378 168 420 160 426 181 C 420 208 382 211 361 203 Z"
        fill="url(#leafA)"/>
  <path d="M 361 203 C 384 169 416 163 426 181"
        stroke="#225410" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 361 203 C 378 168 420 160 426 181 C 420 208 382 211 361 203 Z"
        fill="none" stroke="#225410" stroke-width="2.5"/>

  <!-- Feuille avant (gauche) -->
  <path d="M 356 206 C 336 180 341 142 362 138 C 380 149 382 186 356 206 Z"
        fill="url(#leafB)"/>
  <path d="M 356 206 C 347 180 350 150 362 138"
        stroke="#1E4C0C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 356 206 C 336 180 341 142 362 138 C 380 149 382 186 356 206 Z"
        fill="none" stroke="#1E4C0C" stroke-width="2.5"/>
</svg>
